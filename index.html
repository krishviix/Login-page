<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <form id="form">
        <h2>Registeration Form </h2>
        <p id="err1" class="error"></p>
        <input type="text" id="name" placeholder="Full Name">
        <p id="err2" class="error"></p>
        <input type="text" id="email" placeholder="Email">
        <p id="err3" class="error"></p>
        <input type="text" id="password" placeholder="Password">
        <p id="err4" class="error"></p>
        <input type="text" id="confirm" placeholder="Confirm Password">
        <p id="err5" class="error"></p>
        <button id="but" type="submit">Register</button>
        <p id="success"></p>
    </form>
    <script src="form.js"></script>
    
</body>
</html>
